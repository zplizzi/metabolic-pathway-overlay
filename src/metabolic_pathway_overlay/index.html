function openPanel(label) {
  const data = ANALYTE_DATA[label];
  if (!data) return;

  sessionStorage.setItem("pv_panel", JSON.stringify({ type: "mapped", label }));
  document.getElementById("panel-title").textContent = label;
  // Show dataset count as subtitle
  const dsCount = data.datasets ? data.datasets.length : 0;
  document.getElementById("panel-source").textContent = `${dsCount} dataset${dsCount !== 1 ? "s" : ""} matched`;
  document.getElementById("detail-panel").classList.remove("hidden");

  const body = document.getElementById("panel-body");
  body.innerHTML = "";

  // Show overall status pill with continuous color
  const { score, hasData: hasScoreData } = getOverlayScore(label);
  if (hasScoreData && score !== null) {
    const color = scoreToColor(score);
    const pill = document.createElement("div");
    pill.className = "status-row";
    const statusText = score < 0.3 ? "LOW" : score > 0.7 ? "HIGH" : score < 0.4 ? "Low-Normal" : score > 0.6 ? "High-Normal" : "Normal";
    // Use white text on dark colors, dark text on light colors
    const textColor = (score < 0.35 || score > 0.72) ? "#fff" : "#333";
    pill.innerHTML = `<span class="status-pill" style="background:${color};color:${textColor}">${statusText}</span>`;
    body.appendChild(pill);
  }

  if (data.datasets && data.datasets.length > 0) {
    // Compute shared X-axis date range across all datasets
    let globalMinDate = Infinity, globalMaxDate = -Infinity;
    for (const ds of data.datasets) {
      for (const h of ds.history) {
        if (h.value == null || h.value === "?") continue;
        const t = new Date(h.date).getTime();
        if (t < globalMinDate) globalMinDate = t;
        if (t > globalMaxDate) globalMaxDate = t;
      }
    }
    const sharedDateRange = { min: globalMinDate, max: globalMaxDate };

    for (const ds of data.datasets) {
      const sec = document.createElement("div");

      const dsTitle = document.createElement("div");
      dsTitle.style.cssText = "font-size:12px;font-weight:700;color:#555;margin-bottom:2px;margin-top:12px;text-transform:uppercase;letter-spacing:0.04em;";
      dsTitle.textContent = ds.label;
      sec.appendChild(dsTitle);

      if (ds.analyte && ds.analyte !== label) {
        const analyteName = document.createElement("div");
        analyteName.style.cssText = "font-size:11px;color:#999;margin-bottom:6px;";
        analyteName.textContent = `Tested as: ${ds.analyte}`;
        sec.appendChild(analyteName);
      }

      // Show mapping note if present
      if (ds.note) {
        const noteDiv = document.createElement("div");
        noteDiv.className = "note-box";
        noteDiv.style.cssText = "font-size:11px;color:#888;font-style:italic;margin-bottom:8px;padding:6px 8px;";
        noteDiv.textContent = ds.note;
        sec.appendChild(noteDiv);
      }

      const validHistory = ds.history.filter(h => h.value !== null && h.value !== "?");
      if (validHistory.length > 0) {
        const sparkDiv = document.createElement("div");
        sparkDiv.className = "chart-area";
        sparkDiv.style.height = "140px";
        sparkDiv.appendChild(renderSparkline(ds, sharedDateRange));
        sec.appendChild(sparkDiv);
      }

      const table = document.createElement("table");
      table.className = "history-table";
      table.innerHTML = `<thead><tr><th>Date</th><th>Value</th><th>Unit</th><th>Status</th></tr></thead>`;
      const tbody = document.createElement("tbody");
      const sorted = [...ds.history].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach((row, i) => {
        const tr = document.createElement("tr");
        if (i === 0) tr.className = "latest";
        const dotCls = statusDot(row.status);
        tr.innerHTML = `
          <td>${row.date}</td>
          <td class="val">${row.value}</td>
          <td style="color:#888">${ds.unit}</td>
          <td class="status-cell"><span class="status-dot ${dotCls}"></span>${row.status}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      sec.appendChild(table);
      body.appendChild(sec);
    }
  } else {
    const nd = document.createElement("div");
    nd.className = "no-data";
    nd.textContent = "No direct measurement available";
    body.appendChild(nd);
  }
}

function statusDot(status) {
  if (!status) return "dot-unknown";
  const s = status.toLowerCase();
  if (s.includes("high") || s.includes("low")) return "dot-high";
  if (s.includes("normal")) return "dot-normal";
  return "dot-unknown";
}

function renderSparkline(ds, sharedDateRange) {
  const vals = ds.history
    .filter(h => h.value !== null && h.value !== "?")
    .sort((a, b) => a.date.localeCompare(b.date));
  if (vals.length === 0) return document.createElement("svg");

  const W = 340, H = 140, PAD_L = 52, PAD_R = 10, PAD_T = 8, PAD_B = 22;
  const sparkSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  sparkSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  sparkSvg.setAttribute("width", "100%");

  // Date-based X axis — use shared range so all charts align
  const minDate = sharedDateRange ? sharedDateRange.min : Math.min(...vals.map(v => new Date(v.date).getTime()));
  const maxDate = sharedDateRange ? sharedDateRange.max : Math.max(...vals.map(v => new Date(v.date).getTime()));
  const dateRange = maxDate - minDate;
  const scaleX = d => dateRange > 0
    ? PAD_L + ((d - minDate) / dateRange) * (W - PAD_L - PAD_R)
    : (W - PAD_L - PAD_R) / 2 + PAD_L;

  // Y axis: minimum of 0, include ref range
  const allVals = vals.map(v => +v.value);
  const lo = ds.yMin != null ? ds.yMin : 0;
  const hi = Math.max(...allVals, ds.refHigh || 0) * 1.15;
  const yRange = hi - lo || 1;
  const scaleY = v => H - PAD_B - ((v - lo) / yRange) * (H - PAD_T - PAD_B);
  const plotLeft = PAD_L;
  const plotRight = W - PAD_R;

  // ── Y axis line ──
  sparkSvg.appendChild(svgEl("line", {
    x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: H - PAD_B,
    stroke: "#ddd", "stroke-width": 1
  }));

  // ── Reference range band + Y-axis ticks ──
  // Reference range band and ticks (supports one-sided ranges)
  const hasRefLow = ds.refLow != null;
  const hasRefHigh = ds.refHigh != null;

  if (hasRefLow && hasRefHigh) {
    // Full band
    const bandY1 = scaleY(ds.refHigh);
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: bandY1, width: plotRight - plotLeft, height: bandY2 - bandY1,
      fill: "#e8f5e9", opacity: "0.6"
    }));
  } else if (hasRefLow) {
    // Only lower bound — shade from refLow to top
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: PAD_T, width: plotRight - plotLeft, height: bandY2 - PAD_T,
      fill: "#e8f5e9", opacity: "0.4"
    }));
  } else if (hasRefHigh) {
    // Only upper bound — shade from bottom to refHigh
    const bandY1 = scaleY(ds.refHigh);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: bandY1, width: plotRight - plotLeft, height: (H - PAD_B) - bandY1,
      fill: "#e8f5e9", opacity: "0.4"
    }));
  }

  if (hasRefHigh) {
    const bandY1 = scaleY(ds.refHigh);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L - 6, y1: bandY1, x2: PAD_L, y2: bandY1,
      stroke: "#81c784", "stroke-width": 1.5
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: PAD_L - 8, y: bandY1 + 5, "text-anchor": "end",
      fill: "#66bb6a", "font-size": 11, "font-weight": 600
    }, String(ds.refHigh)));
  }

  if (hasRefLow) {
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L - 6, y1: bandY2, x2: PAD_L, y2: bandY2,
      stroke: "#81c784", "stroke-width": 1.5
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: PAD_L - 8, y: bandY2 + 5, "text-anchor": "end",
      fill: "#66bb6a", "font-size": 11, "font-weight": 600
    }, String(ds.refLow)));
  }

  if (ds.refMean != null) {
    const meanY = scaleY(ds.refMean);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L, y1: meanY, x2: plotRight, y2: meanY,
      stroke: "#a5d6a7", "stroke-width": 0.5, "stroke-dasharray": "3 3"
    }));
  }

  // ── Zero tick ──
  const zeroY = scaleY(0);
  sparkSvg.appendChild(svgEl("text", {
    x: PAD_L - 8, y: zeroY + 5, "text-anchor": "end",
    fill: "#bbb", "font-size": 11
  }, "0"));

  // ── Unit label (rotated, left edge) ──
  const unitText = svgEl("text", {
    x: 8, y: (PAD_T + H - PAD_B) / 2,
    "text-anchor": "middle", fill: "#bbb", "font-size": 11,
    transform: `rotate(-90 8 ${(PAD_T + H - PAD_B) / 2})`
  }, ds.unit || "");
  sparkSvg.appendChild(unitText);

  // ── X axis line ──
  sparkSvg.appendChild(svgEl("line", {
    x1: PAD_L, y1: H - PAD_B, x2: plotRight, y2: H - PAD_B,
    stroke: "#ddd", "stroke-width": 1
  }));

  // ── Year tick marks on X axis ──
  const minYear = new Date(minDate).getFullYear();
  const maxYear = new Date(maxDate).getFullYear();
  for (let y = minYear; y <= maxYear + 1; y++) {
    const t = new Date(y, 0, 1).getTime();
    if (t < minDate || t > maxDate) continue;
    const x = scaleX(t);
    sparkSvg.appendChild(svgEl("line", {
      x1: x, y1: H - PAD_B, x2: x, y2: H - PAD_B + 4,
      stroke: "#aaa", "stroke-width": 1
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: x, y: H - PAD_B + 14, "text-anchor": "middle",
      fill: "#999", "font-size": 11
    }, String(y)));
  }

  // ── Data line (skip for single point) ──
  if (vals.length > 1) {
    const pts = vals.map(v => `${scaleX(new Date(v.date).getTime())},${scaleY(+v.value)}`).join(" ");
    sparkSvg.appendChild(svgEl("polyline", {
      points: pts, fill: "none", stroke: "#5b9bd5", "stroke-width": "2"
    }));
  }

  // ── Data points ──
  vals.forEach(v => {
    const s = (v.status || "").toLowerCase();
    sparkSvg.appendChild(svgEl("circle", {
      cx: scaleX(new Date(v.date).getTime()), cy: scaleY(+v.value), r: 4,
      fill: (s.includes("high") || s.includes("low")) ? "#e74c3c" : "#27ae60"
    }));
  });

  return sparkSvg;
}

  sessionStorage.removeItem("pv_panel");

// ─── PAN / ZOOM ──────────────────────────────────────────────────────────────

let viewZoom = 1, viewX = 24, viewY = 24;
const MIN_ZOOM = 0.2, MAX_ZOOM = 4;

function applyView() {
  const wrap = document.querySelector(".diagram-wrap");
  wrap.style.transform = `translate(${viewX}px, ${viewY}px) scale(${viewZoom})`;
  // Persist to sessionStorage so refresh preserves position
  sessionStorage.setItem("pv_view", JSON.stringify({ zoom: viewZoom, x: viewX, y: viewY }));
}

function resetView() {
  // Restore saved view if available for the current pathway
  const saved = sessionStorage.getItem("pv_view");
  if (saved) {
    try {
      const v = JSON.parse(saved);
      viewZoom = v.zoom; viewX = v.x; viewY = v.y;
    } catch { viewZoom = 1; viewX = 24; viewY = 24; }
  } else {
    viewZoom = 1; viewX = 24; viewY = 24;
  }
  applyView();
}

(function initPanZoom() {
  const pane = document.getElementById("viewer-container");

  // ── Wheel: scroll to zoom (mouse), two-finger pan (trackpad) ──
  pane.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.ctrlKey) {
      // Pinch-zoom (macOS trackpad sends ctrlKey for pinch gestures)
      zoomAt(e, -e.deltaY * 0.01);
    } else if (Math.abs(e.deltaX) > 0 || e.deltaMode === 0 && Math.abs(e.deltaY) < 50) {
      // Trackpad two-finger pan (small deltaY, has deltaX)
      viewX -= e.deltaX;
      viewY -= e.deltaY;
      applyView();
    } else {
      // Mouse scroll wheel — zoom
      const delta = -e.deltaY * 0.003;
      zoomAt(e, delta);
    }
  }, { passive: false });

  function zoomAt(e, delta) {
    const rect = pane.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const bx = (mx - viewX) / viewZoom;
    const by = (my - viewY) / viewZoom;
    const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, viewZoom * (1 + delta)));
    viewX = mx - bx * newZoom;
    viewY = my - by * newZoom;
    viewZoom = newZoom;
    applyView();
  }

  // ── Click-drag to pan ──
  let dragging = false, dragStartX, dragStartY, dragViewX, dragViewY;

  pane.addEventListener("mousedown", (e) => {
    // Only left-click, and not on a clickable node
    if (e.button !== 0) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
    pane.style.cursor = "grabbing";
    e.preventDefault();
  });

  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    viewX = dragViewX + (e.clientX - dragStartX);
    viewY = dragViewY + (e.clientY - dragStartY);
    applyView();
  });

  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    pane.style.cursor = "";
  });
})();

    pathwaySelect.style.display = "none";
    overlayToggle.style.display = "none";
    timeSelect.style.display = "none";
    subtitleText.textContent = "Browse all test data by source";
    if (!allAnalytesData) loadAllAnalytes();
  }
}

async function loadAllAnalytes() {
  try {
    const resp = await fetch("/api/all-analytes");
    allAnalytesData = await resp.json();
  } catch (e) {
    console.warn("Failed to load all analytes:", e);
    return;
  }
  renderAllDataView();
}

function renderAllDataView() {
  const pane = document.getElementById("all-data-pane");
  pane.innerHTML = "";

  for (const source of allAnalytesData.sources) {
    const group = document.createElement("div");
    group.className = "source-group";

    const h3 = document.createElement("h3");
    h3.textContent = `${source.name} (${source.analytes.length})`;
    group.appendChild(h3);

    const list = document.createElement("div");
    list.className = "analyte-list";

    for (const analyte of source.analytes) {
      const chip = document.createElement("span");
      chip.className = "analyte-chip";

      // Color dot based on latest status
      const ds = analyte.datasets[0];
      if (ds && ds.history && ds.history.length > 0) {
        const latest = [...ds.history].sort((a, b) => b.date.localeCompare(a.date))[0];
        const score = valueToScore(latest.value, ds.refLow, ds.refHigh);
        if (score !== null) {
          const dot = document.createElement("span");
          dot.className = "status-dot-mini";
          dot.style.background = scoreToColor(score);
          chip.appendChild(dot);
        }
      }

      chip.appendChild(document.createTextNode(analyte.name));
      chip.addEventListener("click", () => {
        // Try to find cross-referenced data from the mapped analyte data
        const resolved = resolveAnalyteLabel(analyte.name) || resolveAnalyteLabel(analyte.datasets[0]?.analyte);
        if (resolved && ANALYTE_DATA[resolved]) {
          openPanel(resolved);
        } else {
          openPanelDirect(analyte.name, analyte.datasets);
        }
      });
      list.appendChild(chip);
    }

    group.appendChild(list);
    pane.appendChild(group);
  }
}

/** Open the detail panel with directly provided datasets (for All Data view). */
function openPanelDirect(name, datasets) {
  sessionStorage.setItem("pv_panel", JSON.stringify({ type: "direct", name, datasets }));
  document.getElementById("panel-title").textContent = name;
  const dsCount = datasets ? datasets.length : 0;
  document.getElementById("panel-source").textContent = `${dsCount} dataset${dsCount !== 1 ? "s" : ""}`;
  document.getElementById("detail-panel").classList.remove("hidden");

  const body = document.getElementById("panel-body");
  body.innerHTML = "";

  // Status pill
  if (datasets && datasets.length > 0) {
    const ds = datasets[0];
    const latest = ds.history && ds.history.length > 0
      ? [...ds.history].sort((a, b) => b.date.localeCompare(a.date))[0] : null;
    if (latest) {
      const score = valueToScore(latest.value, ds.refLow, ds.refHigh);
      if (score !== null) {
        const color = scoreToColor(score);
        const pill = document.createElement("div");
        pill.className = "status-row";
        const statusText = score < 0.3 ? "LOW" : score > 0.7 ? "HIGH" : score < 0.4 ? "Low-Normal" : score > 0.6 ? "High-Normal" : "Normal";
        const textColor = (score < 0.35 || score > 0.72) ? "#fff" : "#333";
        pill.innerHTML = `<span class="status-pill" style="background:${color};color:${textColor}">${statusText}</span>`;
        body.appendChild(pill);
      }
    }
  }

  // Shared X range
  let globalMinDate = Infinity, globalMaxDate = -Infinity;
  for (const ds of (datasets || [])) {
    for (const h of ds.history) {
      if (h.value == null || h.value === "?") continue;
      const t = new Date(h.date).getTime();
      if (t < globalMinDate) globalMinDate = t;
      if (t > globalMaxDate) globalMaxDate = t;
    }
  }
  const sharedDateRange = { min: globalMinDate, max: globalMaxDate };

  for (const ds of (datasets || [])) {
    const sec = document.createElement("div");

    const dsTitle = document.createElement("div");
    dsTitle.style.cssText = "font-size:12px;font-weight:700;color:#555;margin-bottom:2px;margin-top:12px;text-transform:uppercase;letter-spacing:0.04em;";
    dsTitle.textContent = ds.label;
    sec.appendChild(dsTitle);

    if (ds.note) {
      const noteDiv = document.createElement("div");
      noteDiv.className = "note-box";
      noteDiv.style.cssText = "font-size:11px;color:#888;font-style:italic;margin-bottom:8px;padding:6px 8px;";
      noteDiv.textContent = ds.note;
      sec.appendChild(noteDiv);
    }

    const validHistory = ds.history.filter(h => h.value !== null && h.value !== "?");
    if (validHistory.length > 0) {
      const sparkDiv = document.createElement("div");
      sparkDiv.className = "chart-area";
      sparkDiv.style.height = "140px";
      sparkDiv.appendChild(renderSparkline(ds, sharedDateRange));
      sec.appendChild(sparkDiv);
    }

    const table = document.createElement("table");
    table.className = "history-table";
    table.innerHTML = `<thead><tr><th>Date</th><th>Value</th><th>Unit</th><th>Status</th></tr></thead>`;
    const tbody = document.createElement("tbody");
    const sorted = [...ds.history].sort((a, b) => b.date.localeCompare(a.date));
    sorted.forEach((row, i) => {
      const tr = document.createElement("tr");
      if (i === 0) tr.className = "latest";
      const dotCls = statusDot(row.status);
      tr.innerHTML = `
        <td>${row.date}</td>
        <td class="val">${row.value}</td>
        <td style="color:#888">${ds.unit}</td>
        <td class="status-cell"><span class="status-dot ${dotCls}"></span>${row.status}</td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    sec.appendChild(table);
    body.appendChild(sec);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

(async () => {
  await loadAnalyteData();
  // Restore overlay state before first render (default: on)
  if (sessionStorage.getItem("pv_overlay") === "") {
    document.getElementById("overlay-toggle").checked = false;
    overlayEnabled = false;
  } else {
    document.getElementById("overlay-legend").classList.add("visible");
  }
  await initPathways();

  // Restore tab
  const savedTab = sessionStorage.getItem("pv_tab");
  if (savedTab && savedTab !== "pathway") {
    switchTab(savedTab);
  }

  // Restore sidebar panel
  const savedPanel = sessionStorage.getItem("pv_panel");
  if (savedPanel) {
    try {
      const p = JSON.parse(savedPanel);
      if (p.type === "mapped" && p.label && ANALYTE_DATA[p.label]) {
        openPanel(p.label);
      } else if (p.type === "direct" && p.name && p.datasets) {
        openPanelDirect(p.name, p.datasets);
      }
    } catch {}
  }
})();
</script>
