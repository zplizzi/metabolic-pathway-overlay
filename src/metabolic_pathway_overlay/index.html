<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathway Viewer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; }

  header {
    padding: 12px 24px;
    background: white;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 600; color: #222; }
  header .subtitle { font-size: 13px; color: #888; flex: 1; }

  .pathway-select {
    padding: 5px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    font-size: 13px;
    color: #333;
    cursor: pointer;
  }
  .pathway-select:hover { border-color: #aaa; }

  .edit-btn {
    padding: 6px 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    font-size: 13px;
    cursor: pointer;
    color: #555;
    transition: all 0.15s;
  }
  .edit-btn:hover { background: #f0f0f0; border-color: #aaa; }
  .edit-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

  .layout { display: flex; height: calc(100vh - 49px); }

  .diagram-pane {
    flex: 1;
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  .diagram-wrap {
    position: absolute;
    transform-origin: 0 0;
  }

  svg#pathway { display: block; }

  /* Editor iframe */
  #editor-container {
    display: none;
    flex: 1;
    position: relative;
  }
  #editor-container iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Metabolite nodes */
  .node-group { cursor: pointer; }
  .node-group:hover .node-rect { filter: brightness(0.93); }
  .node-rect { transition: filter 0.15s; }
  .node-label { pointer-events: none; }
  .node-sublabel { font-size: 11px; pointer-events: none; fill: #666; }

  /* Status badge */
  .badge { font-size: 10px; font-weight: 700; pointer-events: none; }
  .badge-rect { rx: 4; ry: 4; }

  /* Panel */
  .detail-panel {
    width: 400px;
    background: white;
    border-left: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.2s;
  }
  .detail-panel.hidden { width: 0; border-left: none; }

  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid #f0f0f0;
  }
  .panel-header h2 { font-size: 16px; font-weight: 600; }
  .panel-header .panel-source { font-size: 12px; color: #888; margin-top: 2px; }
  .panel-close {
    float: right;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #999;
    line-height: 1;
    margin-top: -2px;
  }

  .panel-body { flex: 1; overflow-y: auto; padding: 16px 20px; }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .status-pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .status-high { background: #fde0de; color: #c0392b; }
  .status-low { background: #fde0de; color: #c0392b; }
  .status-normal { background: #e8f5e9; color: #2e7d32; }
  .status-supp { background: #1a3a6b; color: white; }
  .status-inferred { background: #fff3cd; color: #856404; }
  .status-unknown { background: #f0f0f0; color: #888; }

  .history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .history-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 6px 6px;
    border-bottom: 1px solid #eee;
  }
  .history-table td {
    padding: 6px 6px;
    border-bottom: 1px solid #f5f5f5;
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table .val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .history-table .latest td { background: #fafafa; }
  .history-table .status-cell { font-size: 11px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .dot-high { background: #e74c3c; }
  .dot-low { background: #e74c3c; }
  .dot-normal { background: #27ae60; }
  .dot-unknown { background: #bbb; }

  .chart-area { margin-bottom: 16px; }
  .chart-area canvas { width: 100% !important; }

  .ref-range {
    font-size: 12px;
    color: #888;
    margin-bottom: 12px;
  }

  .note-box {
    background: #f8f9fa;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 12px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .note-box strong { color: #333; }

  .no-data {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    padding: 32px 0;
  }

  .sparkline { overflow: visible; }

  .edge-label { font-size: 11px; fill: #666; }
  .edge-label-green { font-size: 11px; fill: #5DAA68; font-weight: 600; }
  .group-label { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; }

  /* Overlay controls */
  /* Tabs */
  .tab-bar {
    display: flex; gap: 0; margin-right: 16px;
  }
  .tab-btn {
    padding: 5px 14px; border: 1px solid #ccc; background: white;
    font-size: 13px; color: #555; cursor: pointer; transition: all 0.15s;
  }
  .tab-btn:first-child { border-radius: 6px 0 0 6px; }
  .tab-btn:last-child { border-radius: 0 6px 6px 0; }
  .tab-btn + .tab-btn { border-left: none; }
  .tab-btn.active { background: #1a73e8; color: white; border-color: #1a73e8; }

  /* All Data list view */
  .all-data-pane {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    background: #f8f9fa;
  }
  .all-data-pane.visible { display: block; }

  .source-group { margin-bottom: 24px; }
  .source-group h3 {
    font-size: 13px; font-weight: 700; color: #555; text-transform: uppercase;
    letter-spacing: 0.04em; margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid #e0e0e0;
  }
  .analyte-list {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .analyte-chip {
    padding: 4px 10px; border-radius: 4px; font-size: 12px;
    background: white; border: 1px solid #e0e0e0; cursor: pointer;
    transition: all 0.1s; color: #333;
  }
  .analyte-chip:hover { background: #e8f0fe; border-color: #4285f4; }
  .analyte-chip .status-dot-mini {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    margin-right: 4px; vertical-align: middle;
  }

  .overlay-toggle {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; color: #555; cursor: pointer; user-select: none;
  }
  .overlay-toggle input { cursor: pointer; }
  .time-select {
    padding: 4px 8px; border: 1px solid #ccc; border-radius: 6px;
    background: white; font-size: 12px; color: #333; cursor: pointer;
  }

  /* Overlay glow ring around matched nodes */
  .overlay-ring {
    pointer-events: none;
    transition: opacity 0.2s;
  }

  /* Legend */
  .overlay-legend {
    position: absolute; bottom: 12px; left: 12px;
    background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    border-radius: 8px; padding: 8px 12px; font-size: 11px;
    display: none; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .overlay-legend.visible { display: flex; gap: 12px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 3px; border: 1px solid rgba(0,0,0,0.15);
  }
</style>
</head>
<body>

<header>
  <h1>Pathway Viewer</h1>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-pathway" onclick="switchTab('pathway')">Pathway</button>
    <button class="tab-btn" id="tab-alldata" onclick="switchTab('alldata')">All Data</button>
  </div>
  <select class="pathway-select" id="pathway-select" onchange="switchPathway(this.value)"></select>
  <span class="subtitle" id="subtitle-text">Click any metabolite to see test history</span>
  <label class="overlay-toggle" title="Color nodes by analyte status">
    <input type="checkbox" id="overlay-toggle" checked onchange="toggleOverlay()"> Overlay recent test data
  </label>
  <select class="time-select" id="time-window" onchange="updateOverlay()">
    <option value="latest">Most Recent</option>
    <option value="3">Last 3 months</option>
    <option value="6" selected>Last 6 months</option>
    <option value="12">Last 12 months</option>
    <option value="all">All Time</option>
  </select>
  <button class="edit-btn" onclick="location.href='/api/share'">Share</button>
  <button class="edit-btn" id="edit-btn" onclick="toggleEditor()">Edit Diagram</button>
</header>

<div class="layout">
  <!-- Viewer -->
  <div class="diagram-pane" id="viewer-container">
    <div class="diagram-wrap">
      <svg id="pathway" width="960" height="700" viewBox="0 0 960 700"></svg>
    </div>
    <div class="overlay-legend" id="overlay-legend">
      <span style="font-size:13px;color:#888;font-weight:600">Low</span>
      <div style="position:relative;width:300px;height:36px;">
        <div style="width:300px;height:20px;border-radius:4px;border:1px solid rgba(0,0,0,0.12);background:linear-gradient(to right,#9C27B0,#4285F4 25%,#4CAF50 50%,#FFEB3B 75%,#F44336)"></div>
        <div style="position:relative;width:300px;height:14px;">
          <span style="position:absolute;left:0%;transform:translateX(-50%);font-size:10px;color:#999">0</span>
          <span style="position:absolute;left:10%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:20%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:30%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:40%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:50%;transform:translateX(-50%);font-size:10px;color:#999">.5</span>
          <span style="position:absolute;left:60%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:70%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:80%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:90%;transform:translateX(-50%);font-size:10px;color:#bbb">|</span>
          <span style="position:absolute;left:100%;transform:translateX(-50%);font-size:10px;color:#999">1</span>
        </div>
      </div>
      <span style="font-size:13px;color:#888;font-weight:600">High</span>
      <span class="legend-item" style="margin-left:8px"><span class="legend-swatch" style="background:#95a5a6"></span> No data</span>
    </div>
  </div>
  <!-- All Data list view -->
  <div class="all-data-pane" id="all-data-pane"></div>
  <!-- Editor (draw.io iframe) -->
  <div id="editor-container"></div>
  <!-- Detail panel -->
  <div class="detail-panel hidden" id="detail-panel">
    <div class="panel-header">
      <button class="panel-close" onclick="closePanel()">×</button>
      <h2 id="panel-title">—</h2>
      <div class="panel-source" id="panel-source"></div>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script src="drawio-renderer.js"></script>
<script>
// ─── ANALYTE DATA (loaded from server) ────────────────────────────────────────

// Dynamically populated: maps node IDs or labels to their test data
let METABOLITES = {};

// Server-provided mapping: node label → {datasets: [...]}
let ANALYTE_DATA = {};
let ANALYTE_ALIASES = {};

const BADGE_STYLES = {
  high:     { fill: "#c0392b", text: "#fff" },
  low:      { fill: "#3498db", text: "#fff" },
  supp:     { fill: "#1a3a6b", text: "#fff" },
  inferred: { fill: "#c0392b", text: "#fff" },
  req:      { fill: "#d6b656", text: "#7A5A00" },
  ok:       { fill: "#5DAA68", text: "#fff" },
  normal:   { fill: "#27ae60", text: "#fff" },
  nodata:   { fill: "#95a5a6", text: "#fff" },
};

// Overlay state
let overlayEnabled = true;
// Track which SVG groups correspond to which analyte labels
let nodeAnalyteMap = []; // [{g: SVGGElement, label: string, node: {x,y,w,h}}]

async function loadAnalyteData() {
  try {
    const resp = await fetch("/api/analyte-data");
    const data = await resp.json();
    ANALYTE_ALIASES = data._aliases || {};
    delete data._aliases;
    ANALYTE_DATA = data;
  } catch (e) {
    console.warn("Failed to load analyte data:", e);
  }
}

/** Resolve a node's plain-text label to an analyte data entry.
 *  Tries exact match, then alias lookup, then case-insensitive match. */
function resolveAnalyteLabel(plainText) {
  if (!plainText) return null;
  const label = plainText.trim();

  // Try a single candidate against data + aliases (exact then case-insensitive)
  function tryMatch(s) {
    if (ANALYTE_DATA[s]) return s;
    const aliased = ANALYTE_ALIASES[s];
    if (aliased && ANALYTE_DATA[aliased]) return aliased;
    const lower = s.toLowerCase();
    for (const key of Object.keys(ANALYTE_DATA)) {
      if (key.toLowerCase() === lower) return key;
    }
    for (const [alias, canonical] of Object.entries(ANALYTE_ALIASES)) {
      if (alias.toLowerCase() === lower && ANALYTE_DATA[canonical]) return canonical;
    }
    return null;
  }

  // 1. Try full label
  const full = tryMatch(label);
  if (full) return full;

  // 2. Handle "Full Name (ABBREV)" pattern — try both parts
  const parenMatch = label.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
  if (parenMatch) {
    const fromName = tryMatch(parenMatch[1].trim());
    if (fromName) return fromName;
    const fromAbbrev = tryMatch(parenMatch[2].trim());
    if (fromAbbrev) return fromAbbrev;
  }

  return null;
}

// ─── Continuous color gradient for overlay ──────────────────────────────────
// Score 0.0 = critically low → 0.5 = normal → 1.0 = critically high
const COLOR_STOPS = [
  { t: 0.00, r: 156, g: 39,  b: 176 },  // #9C27B0 purple
  { t: 0.25, r: 66,  g: 133, b: 244 },  // #4285F4 blue
  { t: 0.50, r: 76,  g: 175, b: 80  },  // #4CAF50 green
  { t: 0.75, r: 255, g: 235, b: 59  },  // #FFEB3B yellow
  { t: 1.00, r: 244, g: 67,  b: 54  },  // #F44336 red
];
const NODATA_COLOR = "#95a5a6";

function scoreToColor(score) {
  const s = Math.max(0, Math.min(1, score));
  // Find the two stops we're between
  for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
    const a = COLOR_STOPS[i], b = COLOR_STOPS[i + 1];
    if (s >= a.t && s <= b.t) {
      const f = (s - a.t) / (b.t - a.t);
      const r = Math.round(a.r + (b.r - a.r) * f);
      const g = Math.round(a.g + (b.g - a.g) * f);
      const bl = Math.round(a.b + (b.b - a.b) * f);
      return `rgb(${r},${g},${bl})`;
    }
  }
  return `rgb(${COLOR_STOPS[COLOR_STOPS.length - 1].r},${COLOR_STOPS[COLOR_STOPS.length - 1].g},${COLOR_STOPS[COLOR_STOPS.length - 1].b})`;
}

/** Compute a 0–1 score for a single value relative to its reference range.
 *  0.0 = critically low, 0.5 = mid-normal, 1.0 = critically high.
 *  Values within range map to [0.4, 0.6]. Values outside scale toward 0 or 1,
 *  reaching the extreme at 1 range-width beyond the boundary. */
function valueToScore(value, refLow, refHigh) {
  if (value == null) return null;
  // One-sided ranges: only upper bound
  if (refLow == null && refHigh != null) {
    if (value <= refHigh) return 0.5; // normal
    const dist = (value - refHigh) / refHigh; // normalize by refHigh itself
    return Math.min(1, 0.6 + 0.4 * Math.min(1, dist));
  }
  // One-sided ranges: only lower bound
  if (refHigh == null && refLow != null) {
    if (value >= refLow) return 0.5; // normal
    const dist = (refLow - value) / refLow;
    return Math.max(0, 0.4 - 0.4 * Math.min(1, dist));
  }
  if (refLow == null || refHigh == null) return null;
  const range = refHigh - refLow;
  if (range <= 0) return 0.5;
  if (value < refLow) {
    const dist = (refLow - value) / range;
    return Math.max(0, 0.4 - 0.4 * Math.min(1, dist));
  }
  if (value > refHigh) {
    const dist = (value - refHigh) / range;
    return Math.min(1, 0.6 + 0.4 * Math.min(1, dist));
  }
  // Within range: linearly map [refLow, refHigh] → [0.4, 0.6]
  return 0.4 + 0.2 * (value - refLow) / range;
}

/** Get the overlay score for a node label. Returns {score: 0-1, hasData: bool}.
 *  Uses the most abnormal (furthest from 0.5) score across all datasets. */
function getOverlayScore(label) {
  const entry = ANALYTE_DATA[label];
  if (!entry || !entry.datasets || entry.datasets.length === 0) return { score: null, hasData: false };

  let worstScore = null;
  let worstDist = -1;
  let hasData = false;

  for (const ds of entry.datasets) {
    const filtered = getFilteredHistory(ds);
    if (filtered.length === 0) continue;
    const latest = [...filtered].sort((a, b) => b.date.localeCompare(a.date))[0];
    if (latest.value == null) continue;
    hasData = true;

    const s = valueToScore(latest.value, ds.refLow, ds.refHigh);
    if (s === null) continue;
    const dist = Math.abs(s - 0.5);
    if (dist > worstDist) {
      worstDist = dist;
      worstScore = s;
    }
  }

  return { score: worstScore, hasData };
}

function getTimeCutoff() {
  const sel = document.getElementById("time-window").value;
  if (sel === "all") return "0000-01-01";
  if (sel === "latest") return "2099-01-01"; // special: handled in filtering
  const months = parseInt(sel);
  const d = new Date();
  d.setMonth(d.getMonth() - months);
  return d.toISOString().slice(0, 10);
}

/** For the "latest" time window, get the single most recent entry across all datasets. */
function getLatestEntryForDataset(ds) {
  if (!ds.history || ds.history.length === 0) return null;
  return [...ds.history].sort((a, b) => b.date.localeCompare(a.date))[0];
}

function getFilteredHistory(ds) {
  const sel = document.getElementById("time-window").value;
  if (sel === "latest") {
    const latest = getLatestEntryForDataset(ds);
    return latest ? [latest] : [];
  }
  const cutoff = getTimeCutoff();
  return ds.history.filter(h => h.date >= cutoff);
}

// ─── PATHWAY LOADING ─────────────────────────────────────────────────────────

let drawioXml = null;
let currentPathway = null;

async function initPathways() {
  const resp = await fetch("/api/pathways");
  const names = await resp.json();
  const select = document.getElementById("pathway-select");
  select.innerHTML = "";
  for (const name of names) {
    const opt = document.createElement("option");
    opt.value = name;
    opt.textContent = name.replace(/_/g, " ");
    select.appendChild(opt);
  }
  // Load first pathway (or from URL hash)
  const initial = location.hash.slice(1) || "full_figure_1" || names[0];
  if (initial && names.includes(initial)) {
    select.value = initial;
  }
  await switchPathway(select.value);
}

async function switchPathway(name) {
  const isNewPathway = currentPathway && currentPathway !== name;
  currentPathway = name;
  location.hash = name;
  const resp = await fetch(`/api/pathways/${name}`);
  drawioXml = await resp.text();
  renderFromDrawio();
  if (isNewPathway) sessionStorage.removeItem("pv_view");
  resetView();
}

// ─── Drawio rendering (parsing, SVG generation, overlays) in drawio-renderer.js

function toggleOverlay() {
  overlayEnabled = document.getElementById("overlay-toggle").checked;
  sessionStorage.setItem("pv_overlay", overlayEnabled ? "1" : "");
  document.getElementById("overlay-legend").classList.toggle("visible", overlayEnabled);
  renderFromDrawio();
  resetView();
}

function updateOverlay() {
  if (overlayEnabled) {
    renderFromDrawio();
    resetView();
  }
}

// ─── DRAW.IO EMBED EDITOR ────────────────────────────────────────────────────

let editorActive = false;
let editorFrame = null;

function toggleEditor() {
  if (editorActive) {
    exitEditor();
  } else {
    enterEditor();
  }
}

function enterEditor() {
  editorActive = true;
  document.getElementById("edit-btn").classList.add("active");
  document.getElementById("edit-btn").textContent = "Editing...";
  document.getElementById("viewer-container").style.display = "none";
  document.getElementById("detail-panel").classList.add("hidden");

  const container = document.getElementById("editor-container");
  container.style.display = "flex";

  editorFrame = document.createElement("iframe");
  editorFrame.src = "https://embed.diagrams.net/?embed=1&proto=json&spin=1&modified=unsavedChanges&saveAndExit=1&noSaveBtn=0&noExitBtn=0";
  container.appendChild(editorFrame);
}

function exitEditor() {
  editorActive = false;
  document.getElementById("edit-btn").classList.remove("active");
  document.getElementById("edit-btn").textContent = "Edit Diagram";
  document.getElementById("editor-container").style.display = "none";
  document.getElementById("viewer-container").style.display = "flex";

  if (editorFrame) {
    editorFrame.remove();
    editorFrame = null;
  }

  renderFromDrawio();
}

window.addEventListener("message", async (evt) => {
  if (!editorFrame) return;

  let msg;
  try { msg = JSON.parse(evt.data); } catch { return; }

  if (msg.event === "init") {
    // Editor ready — send current XML
    editorFrame.contentWindow.postMessage(JSON.stringify({
      action: "load",
      autosave: 0,
      xml: drawioXml
    }), "*");
  } else if (msg.event === "save") {
    // User clicked save
    drawioXml = msg.xml;
    await fetch(`/api/pathways/${currentPathway}`, {
      method: "PUT",
      headers: { "Content-Type": "application/xml" },
      body: msg.xml
    });
    // Request export to stay in editor
    editorFrame.contentWindow.postMessage(JSON.stringify({
      action: "status",
      message: "Saved",
      modified: false
    }), "*");
  } else if (msg.event === "exit") {
    // User clicked exit or save&exit
    if (msg.xml) {
      drawioXml = msg.xml;
      await fetch("/pathway.drawio", {
        method: "PUT",
        headers: { "Content-Type": "application/xml" },
        body: msg.xml
      });
    }
    exitEditor();
  }
});

// ─── DETAIL PANEL ────────────────────────────────────────────────────────────

function openPanel(label) {
  const data = ANALYTE_DATA[label];
  if (!data) return;

  sessionStorage.setItem("pv_panel", JSON.stringify({ type: "mapped", label }));
  document.getElementById("panel-title").textContent = label;
  // Show dataset count as subtitle
  const dsCount = data.datasets ? data.datasets.length : 0;
  document.getElementById("panel-source").textContent = `${dsCount} dataset${dsCount !== 1 ? "s" : ""} matched`;
  document.getElementById("detail-panel").classList.remove("hidden");

  const body = document.getElementById("panel-body");
  body.innerHTML = "";

  // Show overall status pill with continuous color
  const { score, hasData: hasScoreData } = getOverlayScore(label);
  if (hasScoreData && score !== null) {
    const color = scoreToColor(score);
    const pill = document.createElement("div");
    pill.className = "status-row";
    const statusText = score < 0.3 ? "LOW" : score > 0.7 ? "HIGH" : score < 0.4 ? "Low-Normal" : score > 0.6 ? "High-Normal" : "Normal";
    // Use white text on dark colors, dark text on light colors
    const textColor = (score < 0.35 || score > 0.72) ? "#fff" : "#333";
    pill.innerHTML = `<span class="status-pill" style="background:${color};color:${textColor}">${statusText}</span>`;
    body.appendChild(pill);
  }

  if (data.datasets && data.datasets.length > 0) {
    // Compute shared X-axis date range across all datasets
    let globalMinDate = Infinity, globalMaxDate = -Infinity;
    for (const ds of data.datasets) {
      for (const h of ds.history) {
        if (h.value == null || h.value === "?") continue;
        const t = new Date(h.date).getTime();
        if (t < globalMinDate) globalMinDate = t;
        if (t > globalMaxDate) globalMaxDate = t;
      }
    }
    const sharedDateRange = { min: globalMinDate, max: globalMaxDate };

    for (const ds of data.datasets) {
      const sec = document.createElement("div");

      const dsTitle = document.createElement("div");
      dsTitle.style.cssText = "font-size:12px;font-weight:700;color:#555;margin-bottom:2px;margin-top:12px;text-transform:uppercase;letter-spacing:0.04em;";
      dsTitle.textContent = ds.label;
      sec.appendChild(dsTitle);

      if (ds.analyte && ds.analyte !== label) {
        const analyteName = document.createElement("div");
        analyteName.style.cssText = "font-size:11px;color:#999;margin-bottom:6px;";
        analyteName.textContent = `Tested as: ${ds.analyte}`;
        sec.appendChild(analyteName);
      }

      // Show mapping note if present
      if (ds.note) {
        const noteDiv = document.createElement("div");
        noteDiv.className = "note-box";
        noteDiv.style.cssText = "font-size:11px;color:#888;font-style:italic;margin-bottom:8px;padding:6px 8px;";
        noteDiv.textContent = ds.note;
        sec.appendChild(noteDiv);
      }

      const validHistory = ds.history.filter(h => h.value !== null && h.value !== "?");
      if (validHistory.length > 0) {
        const sparkDiv = document.createElement("div");
        sparkDiv.className = "chart-area";
        sparkDiv.style.height = "140px";
        sparkDiv.appendChild(renderSparkline(ds, sharedDateRange));
        sec.appendChild(sparkDiv);
      }

      const table = document.createElement("table");
      table.className = "history-table";
      table.innerHTML = `<thead><tr><th>Date</th><th>Value</th><th>Unit</th><th>Status</th></tr></thead>`;
      const tbody = document.createElement("tbody");
      const sorted = [...ds.history].sort((a, b) => b.date.localeCompare(a.date));
      sorted.forEach((row, i) => {
        const tr = document.createElement("tr");
        if (i === 0) tr.className = "latest";
        const dotCls = statusDot(row.status);
        tr.innerHTML = `
          <td>${row.date}</td>
          <td class="val">${row.value}</td>
          <td style="color:#888">${ds.unit}</td>
          <td class="status-cell"><span class="status-dot ${dotCls}"></span>${row.status}</td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      sec.appendChild(table);
      body.appendChild(sec);
    }
  } else {
    const nd = document.createElement("div");
    nd.className = "no-data";
    nd.textContent = "No direct measurement available";
    body.appendChild(nd);
  }
}

function statusDot(status) {
  if (!status) return "dot-unknown";
  const s = status.toLowerCase();
  if (s.includes("high") || s.includes("low")) return "dot-high";
  if (s.includes("normal")) return "dot-normal";
  return "dot-unknown";
}

function renderSparkline(ds, sharedDateRange) {
  const vals = ds.history
    .filter(h => h.value !== null && h.value !== "?")
    .sort((a, b) => a.date.localeCompare(b.date));
  if (vals.length === 0) return document.createElement("svg");

  const W = 340, H = 140, PAD_L = 52, PAD_R = 10, PAD_T = 8, PAD_B = 22;
  const sparkSvg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  sparkSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  sparkSvg.setAttribute("width", "100%");

  // Date-based X axis — use shared range so all charts align
  const minDate = sharedDateRange ? sharedDateRange.min : Math.min(...vals.map(v => new Date(v.date).getTime()));
  const maxDate = sharedDateRange ? sharedDateRange.max : Math.max(...vals.map(v => new Date(v.date).getTime()));
  const dateRange = maxDate - minDate;
  const scaleX = d => dateRange > 0
    ? PAD_L + ((d - minDate) / dateRange) * (W - PAD_L - PAD_R)
    : (W - PAD_L - PAD_R) / 2 + PAD_L;

  // Y axis: minimum of 0, include ref range
  const allVals = vals.map(v => +v.value);
  const lo = ds.yMin != null ? ds.yMin : 0;
  const hi = Math.max(...allVals, ds.refHigh || 0) * 1.15;
  const yRange = hi - lo || 1;
  const scaleY = v => H - PAD_B - ((v - lo) / yRange) * (H - PAD_T - PAD_B);
  const plotLeft = PAD_L;
  const plotRight = W - PAD_R;

  // ── Y axis line ──
  sparkSvg.appendChild(svgEl("line", {
    x1: PAD_L, y1: PAD_T, x2: PAD_L, y2: H - PAD_B,
    stroke: "#ddd", "stroke-width": 1
  }));

  // ── Reference range band + Y-axis ticks ──
  // Reference range band and ticks (supports one-sided ranges)
  const hasRefLow = ds.refLow != null;
  const hasRefHigh = ds.refHigh != null;

  if (hasRefLow && hasRefHigh) {
    // Full band
    const bandY1 = scaleY(ds.refHigh);
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: bandY1, width: plotRight - plotLeft, height: bandY2 - bandY1,
      fill: "#e8f5e9", opacity: "0.6"
    }));
  } else if (hasRefLow) {
    // Only lower bound — shade from refLow to top
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: PAD_T, width: plotRight - plotLeft, height: bandY2 - PAD_T,
      fill: "#e8f5e9", opacity: "0.4"
    }));
  } else if (hasRefHigh) {
    // Only upper bound — shade from bottom to refHigh
    const bandY1 = scaleY(ds.refHigh);
    sparkSvg.appendChild(svgEl("rect", {
      x: PAD_L, y: bandY1, width: plotRight - plotLeft, height: (H - PAD_B) - bandY1,
      fill: "#e8f5e9", opacity: "0.4"
    }));
  }

  if (hasRefHigh) {
    const bandY1 = scaleY(ds.refHigh);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L - 6, y1: bandY1, x2: PAD_L, y2: bandY1,
      stroke: "#81c784", "stroke-width": 1.5
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: PAD_L - 8, y: bandY1 + 5, "text-anchor": "end",
      fill: "#66bb6a", "font-size": 11, "font-weight": 600
    }, String(ds.refHigh)));
  }

  if (hasRefLow) {
    const bandY2 = scaleY(ds.refLow);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L - 6, y1: bandY2, x2: PAD_L, y2: bandY2,
      stroke: "#81c784", "stroke-width": 1.5
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: PAD_L - 8, y: bandY2 + 5, "text-anchor": "end",
      fill: "#66bb6a", "font-size": 11, "font-weight": 600
    }, String(ds.refLow)));
  }

  if (ds.refMean != null) {
    const meanY = scaleY(ds.refMean);
    sparkSvg.appendChild(svgEl("line", {
      x1: PAD_L, y1: meanY, x2: plotRight, y2: meanY,
      stroke: "#a5d6a7", "stroke-width": 0.5, "stroke-dasharray": "3 3"
    }));
  }

  // ── Zero tick ──
  const zeroY = scaleY(0);
  sparkSvg.appendChild(svgEl("text", {
    x: PAD_L - 8, y: zeroY + 5, "text-anchor": "end",
    fill: "#bbb", "font-size": 11
  }, "0"));

  // ── Unit label (rotated, left edge) ──
  const unitText = svgEl("text", {
    x: 8, y: (PAD_T + H - PAD_B) / 2,
    "text-anchor": "middle", fill: "#bbb", "font-size": 11,
    transform: `rotate(-90 8 ${(PAD_T + H - PAD_B) / 2})`
  }, ds.unit || "");
  sparkSvg.appendChild(unitText);

  // ── X axis line ──
  sparkSvg.appendChild(svgEl("line", {
    x1: PAD_L, y1: H - PAD_B, x2: plotRight, y2: H - PAD_B,
    stroke: "#ddd", "stroke-width": 1
  }));

  // ── Year tick marks on X axis ──
  const minYear = new Date(minDate).getFullYear();
  const maxYear = new Date(maxDate).getFullYear();
  for (let y = minYear; y <= maxYear + 1; y++) {
    const t = new Date(y, 0, 1).getTime();
    if (t < minDate || t > maxDate) continue;
    const x = scaleX(t);
    sparkSvg.appendChild(svgEl("line", {
      x1: x, y1: H - PAD_B, x2: x, y2: H - PAD_B + 4,
      stroke: "#aaa", "stroke-width": 1
    }));
    sparkSvg.appendChild(svgEl("text", {
      x: x, y: H - PAD_B + 14, "text-anchor": "middle",
      fill: "#999", "font-size": 11
    }, String(y)));
  }

  // ── Data line (skip for single point) ──
  if (vals.length > 1) {
    const pts = vals.map(v => `${scaleX(new Date(v.date).getTime())},${scaleY(+v.value)}`).join(" ");
    sparkSvg.appendChild(svgEl("polyline", {
      points: pts, fill: "none", stroke: "#5b9bd5", "stroke-width": "2"
    }));
  }

  // ── Data points ──
  vals.forEach(v => {
    const s = (v.status || "").toLowerCase();
    sparkSvg.appendChild(svgEl("circle", {
      cx: scaleX(new Date(v.date).getTime()), cy: scaleY(+v.value), r: 4,
      fill: (s.includes("high") || s.includes("low")) ? "#e74c3c" : "#27ae60"
    }));
  });

  return sparkSvg;
}

function closePanel() {
  document.getElementById("detail-panel").classList.add("hidden");
  sessionStorage.removeItem("pv_panel");
}

// ─── PAN / ZOOM ──────────────────────────────────────────────────────────────

let viewZoom = 1, viewX = 24, viewY = 24;
const MIN_ZOOM = 0.2, MAX_ZOOM = 4;

function applyView() {
  const wrap = document.querySelector(".diagram-wrap");
  wrap.style.transform = `translate(${viewX}px, ${viewY}px) scale(${viewZoom})`;
  // Persist to sessionStorage so refresh preserves position
  sessionStorage.setItem("pv_view", JSON.stringify({ zoom: viewZoom, x: viewX, y: viewY }));
}

function resetView() {
  // Restore saved view if available for the current pathway
  const saved = sessionStorage.getItem("pv_view");
  if (saved) {
    try {
      const v = JSON.parse(saved);
      viewZoom = v.zoom; viewX = v.x; viewY = v.y;
    } catch { viewZoom = 1; viewX = 24; viewY = 24; }
  } else {
    viewZoom = 1; viewX = 24; viewY = 24;
  }
  applyView();
}

(function initPanZoom() {
  const pane = document.getElementById("viewer-container");

  // ── Wheel: scroll to zoom (mouse), two-finger pan (trackpad) ──
  pane.addEventListener("wheel", (e) => {
    e.preventDefault();

    if (e.ctrlKey) {
      // Pinch-zoom (macOS trackpad sends ctrlKey for pinch gestures)
      zoomAt(e, -e.deltaY * 0.01);
    } else if (Math.abs(e.deltaX) > 0 || e.deltaMode === 0 && Math.abs(e.deltaY) < 50) {
      // Trackpad two-finger pan (small deltaY, has deltaX)
      viewX -= e.deltaX;
      viewY -= e.deltaY;
      applyView();
    } else {
      // Mouse scroll wheel — zoom
      const delta = -e.deltaY * 0.003;
      zoomAt(e, delta);
    }
  }, { passive: false });

  function zoomAt(e, delta) {
    const rect = pane.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const bx = (mx - viewX) / viewZoom;
    const by = (my - viewY) / viewZoom;
    const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, viewZoom * (1 + delta)));
    viewX = mx - bx * newZoom;
    viewY = my - by * newZoom;
    viewZoom = newZoom;
    applyView();
  }

  // ── Click-drag to pan ──
  let dragging = false, dragStartX, dragStartY, dragViewX, dragViewY;

  pane.addEventListener("mousedown", (e) => {
    // Only left-click, and not on a clickable node
    if (e.button !== 0) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragViewX = viewX;
    dragViewY = viewY;
    pane.style.cursor = "grabbing";
    e.preventDefault();
  });

  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    viewX = dragViewX + (e.clientX - dragStartX);
    viewY = dragViewY + (e.clientY - dragStartY);
    applyView();
  });

  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false;
    pane.style.cursor = "";
  });
})();

// ─── TAB SWITCHING & ALL DATA VIEW ────────────────────────────────────────────

let allAnalytesData = null;
let currentTab = "pathway";

function switchTab(tab) {
  currentTab = tab;
  sessionStorage.setItem("pv_tab", tab);
  document.getElementById("tab-pathway").classList.toggle("active", tab === "pathway");
  document.getElementById("tab-alldata").classList.toggle("active", tab === "alldata");

  const diagramPane = document.getElementById("viewer-container");
  const allDataPane = document.getElementById("all-data-pane");
  const pathwaySelect = document.getElementById("pathway-select");
  const overlayToggle = document.querySelector(".overlay-toggle");
  const timeSelect = document.getElementById("time-window");
  const subtitleText = document.getElementById("subtitle-text");

  if (tab === "pathway") {
    diagramPane.style.display = "";
    allDataPane.classList.remove("visible");
    pathwaySelect.style.display = "";
    overlayToggle.style.display = "";
    timeSelect.style.display = "";
    subtitleText.textContent = "Click any metabolite to see test history";
  } else {
    diagramPane.style.display = "none";
    allDataPane.classList.add("visible");
    pathwaySelect.style.display = "none";
    overlayToggle.style.display = "none";
    timeSelect.style.display = "none";
    subtitleText.textContent = "Browse all test data by source";
    if (!allAnalytesData) loadAllAnalytes();
  }
}

async function loadAllAnalytes() {
  try {
    const resp = await fetch("/api/all-analytes");
    allAnalytesData = await resp.json();
  } catch (e) {
    console.warn("Failed to load all analytes:", e);
    return;
  }
  renderAllDataView();
}

function renderAllDataView() {
  const pane = document.getElementById("all-data-pane");
  pane.innerHTML = "";

  for (const source of allAnalytesData.sources) {
    const group = document.createElement("div");
    group.className = "source-group";

    const h3 = document.createElement("h3");
    h3.textContent = `${source.name} (${source.analytes.length})`;
    group.appendChild(h3);

    const list = document.createElement("div");
    list.className = "analyte-list";

    for (const analyte of source.analytes) {
      const chip = document.createElement("span");
      chip.className = "analyte-chip";

      // Color dot based on latest status
      const ds = analyte.datasets[0];
      if (ds && ds.history && ds.history.length > 0) {
        const latest = [...ds.history].sort((a, b) => b.date.localeCompare(a.date))[0];
        const score = valueToScore(latest.value, ds.refLow, ds.refHigh);
        if (score !== null) {
          const dot = document.createElement("span");
          dot.className = "status-dot-mini";
          dot.style.background = scoreToColor(score);
          chip.appendChild(dot);
        }
      }

      chip.appendChild(document.createTextNode(analyte.name));
      chip.addEventListener("click", () => {
        // Try to find cross-referenced data from the mapped analyte data
        const resolved = resolveAnalyteLabel(analyte.name) || resolveAnalyteLabel(analyte.datasets[0]?.analyte);
        if (resolved && ANALYTE_DATA[resolved]) {
          openPanel(resolved);
        } else {
          openPanelDirect(analyte.name, analyte.datasets);
        }
      });
      list.appendChild(chip);
    }

    group.appendChild(list);
    pane.appendChild(group);
  }
}

/** Open the detail panel with directly provided datasets (for All Data view). */
function openPanelDirect(name, datasets) {
  sessionStorage.setItem("pv_panel", JSON.stringify({ type: "direct", name, datasets }));
  document.getElementById("panel-title").textContent = name;
  const dsCount = datasets ? datasets.length : 0;
  document.getElementById("panel-source").textContent = `${dsCount} dataset${dsCount !== 1 ? "s" : ""}`;
  document.getElementById("detail-panel").classList.remove("hidden");

  const body = document.getElementById("panel-body");
  body.innerHTML = "";

  // Status pill
  if (datasets && datasets.length > 0) {
    const ds = datasets[0];
    const latest = ds.history && ds.history.length > 0
      ? [...ds.history].sort((a, b) => b.date.localeCompare(a.date))[0] : null;
    if (latest) {
      const score = valueToScore(latest.value, ds.refLow, ds.refHigh);
      if (score !== null) {
        const color = scoreToColor(score);
        const pill = document.createElement("div");
        pill.className = "status-row";
        const statusText = score < 0.3 ? "LOW" : score > 0.7 ? "HIGH" : score < 0.4 ? "Low-Normal" : score > 0.6 ? "High-Normal" : "Normal";
        const textColor = (score < 0.35 || score > 0.72) ? "#fff" : "#333";
        pill.innerHTML = `<span class="status-pill" style="background:${color};color:${textColor}">${statusText}</span>`;
        body.appendChild(pill);
      }
    }
  }

  // Shared X range
  let globalMinDate = Infinity, globalMaxDate = -Infinity;
  for (const ds of (datasets || [])) {
    for (const h of ds.history) {
      if (h.value == null || h.value === "?") continue;
      const t = new Date(h.date).getTime();
      if (t < globalMinDate) globalMinDate = t;
      if (t > globalMaxDate) globalMaxDate = t;
    }
  }
  const sharedDateRange = { min: globalMinDate, max: globalMaxDate };

  for (const ds of (datasets || [])) {
    const sec = document.createElement("div");

    const dsTitle = document.createElement("div");
    dsTitle.style.cssText = "font-size:12px;font-weight:700;color:#555;margin-bottom:2px;margin-top:12px;text-transform:uppercase;letter-spacing:0.04em;";
    dsTitle.textContent = ds.label;
    sec.appendChild(dsTitle);

    if (ds.note) {
      const noteDiv = document.createElement("div");
      noteDiv.className = "note-box";
      noteDiv.style.cssText = "font-size:11px;color:#888;font-style:italic;margin-bottom:8px;padding:6px 8px;";
      noteDiv.textContent = ds.note;
      sec.appendChild(noteDiv);
    }

    const validHistory = ds.history.filter(h => h.value !== null && h.value !== "?");
    if (validHistory.length > 0) {
      const sparkDiv = document.createElement("div");
      sparkDiv.className = "chart-area";
      sparkDiv.style.height = "140px";
      sparkDiv.appendChild(renderSparkline(ds, sharedDateRange));
      sec.appendChild(sparkDiv);
    }

    const table = document.createElement("table");
    table.className = "history-table";
    table.innerHTML = `<thead><tr><th>Date</th><th>Value</th><th>Unit</th><th>Status</th></tr></thead>`;
    const tbody = document.createElement("tbody");
    const sorted = [...ds.history].sort((a, b) => b.date.localeCompare(a.date));
    sorted.forEach((row, i) => {
      const tr = document.createElement("tr");
      if (i === 0) tr.className = "latest";
      const dotCls = statusDot(row.status);
      tr.innerHTML = `
        <td>${row.date}</td>
        <td class="val">${row.value}</td>
        <td style="color:#888">${ds.unit}</td>
        <td class="status-cell"><span class="status-dot ${dotCls}"></span>${row.status}</td>
      `;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    sec.appendChild(table);
    body.appendChild(sec);
  }
}

// ─── INIT ────────────────────────────────────────────────────────────────────

(async () => {
  await loadAnalyteData();
  // Restore overlay state before first render (default: on)
  if (sessionStorage.getItem("pv_overlay") === "") {
    document.getElementById("overlay-toggle").checked = false;
    overlayEnabled = false;
  } else {
    document.getElementById("overlay-legend").classList.add("visible");
  }
  await initPathways();

  // Restore tab
  const savedTab = sessionStorage.getItem("pv_tab");
  if (savedTab && savedTab !== "pathway") {
    switchTab(savedTab);
  }

  // Restore sidebar panel
  const savedPanel = sessionStorage.getItem("pv_panel");
  if (savedPanel) {
    try {
      const p = JSON.parse(savedPanel);
      if (p.type === "mapped" && p.label && ANALYTE_DATA[p.label]) {
        openPanel(p.label);
      } else if (p.type === "direct" && p.name && p.datasets) {
        openPanelDirect(p.name, p.datasets);
      }
    } catch {}
  }
})();
